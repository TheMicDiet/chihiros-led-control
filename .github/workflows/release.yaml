name: Release

on:
  workflow_run:
    workflows: ["HA Validation"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Create release tag
        id: tag
        shell: bash
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          version="$(python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("custom_components/chihiros/manifest.json").read_text())
          version = manifest.get("version")
          if not isinstance(version, str) or not version.strip():
              raise SystemExit("custom_components/chihiros/manifest.json must contain a non-empty string version")
          print(version.strip())
          PY
          )"
          tag="v$version"

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists. Skipping release."
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" "$SHA" -m "Release $tag"
          git push origin "refs/tags/$tag"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --target "$SHA" \
            --generate-notes \
            --latest
