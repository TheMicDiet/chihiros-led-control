name: chihiros-led-control-bluetooth

services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: chihiros-ha-test
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ./dev/homeassistant/config:/config
      - ./custom_components/chihiros:/config/custom_components/chihiros:ro
      - /run/dbus:/run/dbus:ro
