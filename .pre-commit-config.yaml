repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-docstring-first
  - id: check-yaml
    exclude: "^.gitlab-ci.yml$"
  - id: check-yaml
    args:
      - --unsafe
    files: "^.gitlab-ci.yml$"
  - id: check-toml
  - id: debug-statements
  - id: check-ast

- repo: local
  hooks:
  - id: ruff-check
    name: ruff check
    entry: uv run --group dev ruff check --fix
    language: system
    types_or: [python, pyi]
  - id: ruff-format
    name: ruff format
    entry: uv run --group dev ruff format
    language: system
    types_or: [python, pyi]

- repo: https://github.com/PyCQA/doc8
  rev: v1.1.1
  hooks:
  - id: doc8
